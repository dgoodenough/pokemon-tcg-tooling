<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Ampharos Checklist</title>
<style>
  @page { size: letter; margin: 0.28in 0.32in 0.28in 0.32in; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #fff; color: #000; }
  body { font-family: "Helvetica", "Arial", sans-serif; font-size: 7.8pt; line-height: 1.08; }

  /* Two-column page layout for the set listings. Each set stays intact within a column. */
  .content-columns { column-count: 2; column-gap: 14pt; column-fill: auto; }

  .subset { break-inside: avoid; page-break-inside: avoid; margin-bottom: 3pt; }
  .subset:last-child { margin-bottom: 0; }

  h1.subset-title { font-size: 9pt; margin: 0 0 0.5pt 0; letter-spacing: 0.02em; text-transform: uppercase;
    border-bottom: 0.6pt solid #000; padding-bottom: 0.3pt;
    display: flex; align-items: center; gap: 4pt; }
  h1.subset-title img.symbol { height: 11pt; width: auto; max-width: 18pt;
    object-fit: contain; flex-shrink: 0; image-rendering: -webkit-optimize-contrast; }
  .meta { font-size: 6pt; margin: 0 0 1pt 0; letter-spacing: 0.03em; color: #666; }
  .footnote { font-size: 6.5pt; margin: 1pt 0 3pt; color: #333; font-style: italic; }
  .footnote p { margin: 1pt 0; }

  /* Fixed table layout: every set's table uses the same column widths so #, Card,
     and Rarity columns align vertically between stacked sets in the same column. */
  table.subjects { width: 100%; border-collapse: collapse; table-layout: fixed; }
  table.subjects thead { display: table-header-group; }
  table.subjects tr { break-inside: avoid; page-break-inside: avoid; }
  /* Anchor the leftmost columns at fixed widths so the # / Card / Rarity columns of every
     set's table line up at the same x-coordinates. Variant boxes share the remainder of
     the column equally, so sets with fewer variants get wider boxes (still aligned at the
     left edge of the box section). */
  table.subjects col.col-num    { width: 18pt; }
  table.subjects col.col-name   { width: 95pt; }
  table.subjects col.col-rarity { width: 52pt; }
  /* col-box is auto — fills the remaining width, split evenly among variant columns */

  table.subjects th, table.subjects td { padding: 0.5pt 2.5pt; vertical-align: middle;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  table.subjects th { font-size: 5.8pt; font-weight: bold; text-transform: uppercase;
    letter-spacing: 0.03em; text-align: center; line-height: 1.0;
    border-bottom: 0.5pt solid #000; vertical-align: bottom; padding-top: 1pt; padding-bottom: 1pt;
    white-space: normal; }
  table.subjects th.th-num, table.subjects th.th-name, table.subjects th.th-rarity { text-align: left; }
  table.subjects td { font-size: 7.4pt; border-bottom: 0.3pt dotted #bbb; }
  table.subjects td.td-num { text-align: right; padding-right: 3pt;
    font-variant-numeric: tabular-nums; color: #777; font-size: 6.5pt; }
  table.subjects td.td-name { padding-right: 4pt; line-height: 1.05; font-weight: 500; }
  table.subjects td.td-rarity { font-size: 6.4pt; color: #666; padding-right: 4pt; }
  table.subjects td.td-box, table.subjects th.th-box { text-align: center; }
  table.subjects td.td-box .sq { width: 8pt; height: 8pt; border: 0.6pt solid #000;
    display: inline-block; vertical-align: middle; }
  table.subjects td.td-box .na { color: #bbb; font-size: 8pt; }

  /* Per-set source notes: small italic list under the table explaining where alt variants come from */
  .subset .set-notes { margin: 1pt 0 0 0; padding: 0 0 0 8pt; font-size: 6.5pt; color: #555;
    font-style: italic; line-height: 1.18; }
  .subset .set-notes li { margin: 0; list-style: '\2192  '; /* arrow bullet */ }

  /* Errata section at the end of the checklist */
  .errata { break-before: avoid; page-break-before: avoid; margin-top: 3pt; padding-top: 2pt;
    border-top: 0.7pt solid #000; break-inside: avoid; page-break-inside: avoid; }
  .errata h2 { font-size: 9pt; margin: 0 0 1pt 0; letter-spacing: 0.04em; text-transform: uppercase; }
  .errata .lead { font-size: 6.8pt; color: #555; font-style: italic; margin: 0 0 2pt 0; line-height: 1.2; }
  .errata .entry { font-size: 7pt; margin-bottom: 2pt; break-inside: avoid; page-break-inside: avoid; line-height: 1.18;
    display: grid; grid-template-columns: 11pt 1fr; column-gap: 4pt; align-items: start; }
  .errata .entry .sq { width: 8pt; height: 8pt; border: 0.6pt solid #000; display: inline-block; margin-top: 1pt; }
  .errata .entry .head { font-weight: 600; }
  .errata .entry .body { color: #333; line-height: 1.2; }

  /* Cover — compressed */
  .cover { page-break-after: always; break-after: page; padding: 0.1in 0 0; }
  .cover h1 { font-size: 22pt; margin: 0; letter-spacing: 0.01em; }
  .cover .sub { font-size: 10pt; margin: 2pt 0 8pt; color: #444; }
  .cover .desc { font-size: 8.5pt; max-width: 6.5in; margin-bottom: 8pt; line-height: 1.25; }
  .cover .stat { font-size: 8.5pt; margin-bottom: 2pt; }
  .cover .stat b { letter-spacing: 0.03em; }
  .cover ul.toc { columns: 3; column-gap: 18pt; font-size: 7.5pt; padding-left: 12pt; margin-top: 4pt;
    line-height: 1.2; }
  .cover ul.toc li { break-inside: avoid; margin-bottom: 0.5pt; }
  .cover ul.toc li .yr { color: #777; font-variant-numeric: tabular-nums; }
  .cover .legend { font-size: 7.5pt; margin-top: 8pt; border-top: 0.4pt solid #ccc; padding-top: 4pt; }
  .cover .legend table { font-size: 7.5pt; border-collapse: collapse; margin-top: 2pt; }
  .cover .legend td { padding: 0.5pt 8pt 0.5pt 0; vertical-align: middle; }
  .cover .legend .sq { width: 8pt; height: 8pt; border: 0.7pt solid #000; display: inline-block;
    vertical-align: middle; margin-right: 4pt; }
  .cover .footer { margin-top: 8pt; font-size: 6.8pt; color: #666; font-style: italic; }
  .cover .footer p { margin: 1pt 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js" charset="utf-8"></script>
<script>
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

function yearOf(dateStr) {
  if (!dateStr) return '';
  return String(dateStr).slice(0, 4);
}

function renderCover(cl) {
  const wrap = el('div', 'cover');
  wrap.appendChild(el('h1', null, cl.title));
  wrap.appendChild(el('div', 'sub', cl.subtitle));
  wrap.appendChild(el('div', 'desc', cl.description));

  const stat = el('div', 'stat');
  const b = el('b', null, cl.totalCards + ' cards ');
  stat.appendChild(b);
  stat.appendChild(document.createTextNode('across ' + cl.sets.length + ' sets'));
  wrap.appendChild(stat);

  const tocHeader = el('div', 'stat');
  const tb = el('b', null, 'Contents');
  tocHeader.appendChild(tb);
  tocHeader.style.marginTop = '12pt';
  wrap.appendChild(tocHeader);

  const ul = el('ul', 'toc');
  cl.sets.forEach(s => {
    const li = el('li');
    li.appendChild(document.createTextNode(s.name + ' '));
    const yr = el('span', 'yr', '(' + yearOf(s.releaseDate) + ', ' + s.cards.length + ')');
    li.appendChild(yr);
    ul.appendChild(li);
  });
  wrap.appendChild(ul);

  const legend = el('div', 'legend');
  legend.appendChild(el('b', null, 'How to read this checklist'));
  const tbl = document.createElement('table');
  function row(boxHtml, txt) {
    const tr = document.createElement('tr');
    const td1 = document.createElement('td');
    td1.innerHTML = boxHtml;
    const td2 = document.createElement('td');
    td2.textContent = txt;
    tr.appendChild(td1); tr.appendChild(td2);
    tbl.appendChild(tr);
  }
  row('<span class="sq"></span>', 'Empty box: variant exists, not yet collected. Fill in when you have it.');
  row('<span style="color:#aaa;">—</span>', 'Em-dash: this variant does NOT exist for this card (e.g., no reverse holo printing).');
  row('', 'Variant columns per set reflect only the printings that exist for that release era.');
  legend.appendChild(tbl);
  wrap.appendChild(legend);

  if (cl.footnotes && cl.footnotes.length) {
    const ft = el('div', 'footer');
    cl.footnotes.forEach(f => ft.appendChild(el('p', null, f)));
    wrap.appendChild(ft);
  }
  return wrap;
}

function renderSet(s) {
  const wrap = el('div', 'subset');
  const titleEl = el('h1', 'subset-title');
  if (s.symbol) {
    const img = document.createElement('img');
    img.className = 'symbol';
    img.src = s.symbol;
    img.alt = '';
    titleEl.appendChild(img);
  }
  titleEl.appendChild(document.createTextNode(s.name));
  wrap.appendChild(titleEl);

  const meta = el('div', 'meta');
  const parts = [];
  parts.push(s.cards.length + (s.cards.length === 1 ? ' card' : ' cards'));
  if (s.releaseDate) parts.push('Released ' + s.releaseDate.replace(/\//g, '-'));
  if (s.series) parts.push('Series: ' + s.series);
  meta.textContent = parts.join('   |   ');
  wrap.appendChild(meta);

  const table = el('table', 'subjects');

  // Explicit <colgroup> ensures #, Card, and Rarity columns are the same width on every
  // table, so rarities (and everything else) line up vertically across stacked sets.
  const cg = document.createElement('colgroup');
  cg.appendChild(Object.assign(document.createElement('col'), { className: 'col-num' }));
  cg.appendChild(Object.assign(document.createElement('col'), { className: 'col-name' }));
  cg.appendChild(Object.assign(document.createElement('col'), { className: 'col-rarity' }));
  s.variants.forEach(() =>
    cg.appendChild(Object.assign(document.createElement('col'), { className: 'col-box' })));
  table.appendChild(cg);

  const thead = el('thead');
  const headRow = el('tr');
  headRow.appendChild(el('th', 'th-num', '#'));
  headRow.appendChild(el('th', 'th-name', 'Card'));
  headRow.appendChild(el('th', 'th-rarity', 'Rarity'));
  s.variants.forEach(v => headRow.appendChild(el('th', 'th-box', v.label)));
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = el('tbody');
  s.cards.forEach(c => {
    const tr = el('tr');
    tr.appendChild(el('td', 'td-num', c.num));
    tr.appendChild(el('td', 'td-name', c.name));
    tr.appendChild(el('td', 'td-rarity', c.rarity || ''));
    s.variants.forEach(v => {
      const td = el('td', 'td-box');
      if (c.variants.indexOf(v.key) !== -1) {
        td.appendChild(el('span', 'sq'));
      } else {
        td.appendChild(el('span', 'na', '—'));
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);

  if (s.notes && s.notes.length) {
    const ul = document.createElement('ul');
    ul.className = 'set-notes';
    s.notes.forEach(n => {
      const li = document.createElement('li');
      li.textContent = n;
      ul.appendChild(li);
    });
    wrap.appendChild(ul);
  }

  return wrap;
}

function renderErrata(cl) {
  if (!cl.errata || !cl.errata.length) return null;
  const wrap = el('div', 'errata');
  wrap.appendChild(el('h2', null, 'Errata & Notable Oddities'));
  wrap.appendChild(el('div', 'lead',
    'Cards that exist outside normal collecting scope — test prints, "for position only" samples, ' +
    'and other curiosities surfaced by the source workbook. Not tracked with checkboxes above.'));
  cl.errata.forEach(e => {
    const entry = el('div', 'entry');
    entry.appendChild(el('span', 'sq'));
    const text = document.createElement('div');
    const head = el('div', 'head', e.setName + ' #' + e.num + ' — ' + e.name);
    const body = el('div', 'body', e.note);
    text.appendChild(head);
    text.appendChild(body);
    entry.appendChild(text);
    wrap.appendChild(entry);
  });
  return wrap;
}

function render() {
  const root = document.getElementById('root');
  const cl = window.CHECKLIST;
  document.title = cl.title + ' Checklist';
  root.appendChild(renderCover(cl));
  const flow = el('div', 'content-columns');
  cl.sets.forEach(s => flow.appendChild(renderSet(s)));
  const errata = renderErrata(cl);
  if (errata) flow.appendChild(errata);
  root.appendChild(flow);
}
render();
</script>
</body>
</html>
